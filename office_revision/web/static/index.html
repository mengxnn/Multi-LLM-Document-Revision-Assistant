<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>多 Agent 办公文档修订助手</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>多 Agent 办公文档修订助手</h1>
        <p>本地运行，项目与模型配置保存在当前工作目录。</p>
      </div>
      <button id="refresh-all" type="button">刷新</button>
    </header>

    <main class="layout">
      <section class="workspace">
        <nav class="tabs" aria-label="主要视图">
          <button class="tab is-active" type="button" data-view="projects">项目</button>
          <button class="tab" type="button" data-view="new-project">新建</button>
          <button class="tab" type="button" data-view="profiles">模型</button>
        </nav>

        <section id="view-projects" class="view is-active">
          <div class="section-head">
            <h2>项目</h2>
            <button id="refresh-projects" type="button">刷新项目</button>
          </div>
          <div id="projects" class="list"></div>
          <section id="project-detail" class="detail project-detail">
            <div class="empty-state">请选择一个项目查看详情。</div>
          </section>
          <section id="project-actions" class="project-actions" hidden>
            <h3>继续修改</h3>
            <label for="continue-feedback-text">反馈意见</label>
            <textarea id="continue-feedback-text" rows="4" placeholder="输入本轮继续修改的反馈"></textarea>
            <div class="form-row">
              <label for="continue-cycles">轮数</label>
              <input id="continue-cycles" type="number" min="1" value="2">
              <label class="check"><input id="continue-dry-run" type="checkbox"> dry-run</label>
            </div>
            <button id="continue-project" type="button">继续修改</button>

            <h3>版本决策</h3>
            <div class="actions">
              <button id="decision-accept" type="button">接受</button>
              <button id="decision-continue" type="button" class="secondary">标记继续</button>
              <button id="decision-skip" type="button" class="secondary">跳过</button>
              <button id="decision-abandon" type="button" class="danger">放弃</button>
            </div>

            <h3>删除项目</h3>
            <label class="check"><input id="delete-permanent" type="checkbox"> 永久删除</label>
            <button id="delete-project" type="button" class="danger">删除项目</button>
          </section>
        </section>

        <section id="view-new-project" class="view">
          <h2>新建项目</h2>
          <div class="upload-grid">
            <label class="file-field" for="requirements-file">
              <span>上传修改要求文件（docx/md/txt，可选）</span>
              <input id="requirements-file" type="file" accept=".docx,.md,.txt">
            </label>
            <label class="file-field" for="source-file">
              <span>上传初稿文件（docx/md/txt，可选）</span>
              <input id="source-file" type="file" accept=".docx,.md,.txt">
            </label>
            <label class="file-field" for="meeting-notes-file">
              <span>上传会议纪要文件（docx/md/txt，可选）</span>
              <input id="meeting-notes-file" type="file" accept=".docx,.md,.txt">
            </label>
          </div>
          <label for="requirements-text">修改要求</label>
          <textarea id="requirements-text" rows="7" placeholder="请输入修改要求，必填"></textarea>

          <label for="source-text">初稿，可选</label>
          <textarea id="source-text" rows="5" placeholder="留空则按要求直接起草"></textarea>

          <label for="meeting-notes-text">会议纪要，可选</label>
          <textarea id="meeting-notes-text" rows="4"></textarea>

          <div class="form-row">
            <label for="cycles">轮数</label>
            <input id="cycles" type="number" min="1" value="2">
            <label class="check"><input id="dry-run" type="checkbox"> dry-run</label>
          </div>

          <button id="start-project" type="button" disabled>开始修订</button>
        </section>

        <section id="view-profiles" class="view">
          <div class="section-head">
            <h2>模型配置</h2>
            <button id="refresh-profiles" type="button">刷新配置</button>
          </div>
          <div id="active-profiles" class="active-profiles">
            <div id="active-writer-profile" class="item-meta">writer: -</div>
            <div id="active-reviewer-profile" class="item-meta">reviewer: -</div>
          </div>
          <details id="existing-profiles-section" class="profile-section">
            <summary>现有配置</summary>
            <div id="profiles" class="list"></div>
          </details>
          <details id="add-profile-section" class="profile-section">
            <summary>添加配置</summary>
            <form id="profile-form" class="profile-form">
            <label class="field" for="profile-name">
              <span>显示名称</span>
              <input id="profile-name" placeholder="例如：阿里云 Qwen Plus">
            </label>
            <label class="field" for="profile-model">
              <span>模型ID</span>
              <input id="profile-model" placeholder="例如：qwen-plus-latest">
            </label>
            <label class="field" for="profile-provider">
              <span>供应商类型</span>
              <input id="profile-provider" placeholder="例如：openai-compatible">
            </label>
            <label class="field" for="profile-base-url">
              <span>请求地址</span>
              <input id="profile-base-url" placeholder="https://your-api-endpoint.com">
            </label>
            <label class="field profile-api-key" for="profile-api-key">
              <span>API Key</span>
              <input id="profile-api-key" placeholder="只保存在本地配置文件中" type="password">
            </label>
            <details id="profile-advanced-settings" class="advanced-settings">
              <summary>高级设置</summary>
              <div class="advanced-grid">
                <label class="field" for="profile-timeout-seconds">
                  <span>超时时间（秒）</span>
                  <input id="profile-timeout-seconds" type="number" min="1" placeholder="60">
                </label>
                <label class="field" for="profile-max-retries">
                  <span>最大重试次数</span>
                  <input id="profile-max-retries" type="number" min="0" placeholder="1">
                </label>
                <label class="check"><input id="profile-enable-search" type="checkbox"> enable_search</label>
                <label class="check"><input id="profile-vision" type="checkbox"> vision</label>
                <label class="check"><input id="profile-function-calling" type="checkbox"> function_calling</label>
                <label class="check"><input id="profile-json-output" type="checkbox"> json_output</label>
                <label class="check"><input id="profile-structured-output" type="checkbox"> structured_output</label>
              </div>
            </details>
            <button type="submit">保存配置</button>
            </form>
          </details>
          <button id="check-connections" type="button">检查连接</button>
          <div id="connection-status" class="detail"></div>
        </section>
      </section>

      <aside class="run-panel">
        <h2>运行进度</h2>
        <div id="run-status" class="status">暂无运行</div>
        <ol id="run-events"></ol>
      </aside>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
